<main class="container py-5 dashboard-theme">
  <section class="card shadow-lg border-0 dashboard-shell-card">
    <div class="card-body p-4 p-md-5">
      <header class="mb-4">
        <p class="text-uppercase fw-semibold small mb-1 text-primary">Assignment Dashboard</p>
        <h1 class="h3 mb-2 text-dark">User Profile Dashboard</h1>
        <p class="text-secondary mb-0">
          A simple Angular app showing component interaction through input and output binding.
        </p>
      </header>

      <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4">
          <app-user-card [user]="user()" />
        </div>
        <div class="col-12 col-md-6 col-xl-4">
          <app-user-status [isOnline]="user().isOnline" (statusToggled)="toggleStatus()" />
        </div>
        <div class="col-12 col-xl-4">
          <app-user-bio [bio]="user().bio" (bioSaved)="updateBio($event)" />
        </div>
      </div>
    </div>
  </section>
</main>
