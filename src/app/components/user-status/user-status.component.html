<article class="card h-100 shadow-sm border-0 bg-warning-subtle">
  <div class="card-body d-flex flex-column">
    <h2 class="h5 card-title mb-3 text-warning-emphasis">User Status</h2>
    <p class="mb-3">
      Current status:
      <span class="badge ms-1" [class.text-bg-success]="isOnline()" [class.text-bg-secondary]="!isOnline()">
        {{ isOnline() ? 'Online' : 'Offline' }}
      </span>
    </p>
    <button class="btn btn-warning mt-auto align-self-start" type="button" (click)="onToggleClick()">
      Toggle Status
    </button>
  </div>
</article>
